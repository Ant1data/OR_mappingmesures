name: Upload mensuel OpenRadiation YouTube

on:
  # ── Déclenchement automatique : 1er de chaque mois à 07h00 UTC ──────────────
  schedule:
    - cron: "0 7 1 * *"

  # ── Déclenchement manuel (tests ou rattrapage) ───────────────────────────────
  workflow_dispatch:
    inputs:
      zones:
        description: "Zones à générer et uploader (séparées par des espaces)"
        required: false
        default: "World Europe France"
      privacy:
        description: "Visibilité YouTube"
        required: false
        default: "public"
        type: choice
        options: [public, unlisted, private]

jobs:
  generate-and-upload:
    name: Générer les vidéos et uploader sur YouTube
    runs-on: ubuntu-latest
    timeout-minutes: 120   # les vidéos peuvent prendre ~1h en CI

    env:
      YOUTUBE_TOKEN_JSON:  ${{ secrets.YOUTUBE_TOKEN_JSON }}
      LOG_LEVEL:           INFO
      # Chemins utilisés par les scripts Python
      DATA_DIR:            ${{ github.workspace }}/out
      VIDEOS_DIR:          ${{ github.workspace }}/videos

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      # ── 2. Dépendances système ────────────────────────────────────────────────
      - name: Installer les dépendances système
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends ffmpeg

      # ── 3. Python ────────────────────────────────────────────────────────────
      - name: Configurer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Installer les dépendances Python
        run: pip install -r requirements.txt

      # ── 4. Préparer les dossiers de sortie ───────────────────────────────────
      - name: Créer les dossiers de sortie
        run: mkdir -p out videos last_frame

      # ── 5. Télécharger et extraire la base complète OpenRadiation ──────────────
      - name: Télécharger et extraire la base OpenRadiation
        run: |
          # Téléchargement de l'archive
          wget -q \
            "https://request.openradiation.net/openradiation_dataset.tar.gz" \
            -O /tmp/openradiation_dataset.tar.gz

          # 1re extraction : tar.gz → dossier intermédiaire /tmp/or_extract/
          mkdir -p /tmp/or_extract
          tar xzf /tmp/openradiation_dataset.tar.gz -C /tmp/or_extract/
          echo "── Contenu après 1re extraction ──"
          find /tmp/or_extract -maxdepth 3 | head -40

          # 2e extraction : archive interne si présente, sinon copie depuis out/
          INNER=$(find /tmp/or_extract -maxdepth 3 \( -name "*.tar.gz" -o -name "*.tar" \) | head -1)
          if [ -n "$INNER" ]; then
            echo "Archive interne détectée : $INNER"
            tar xf "$INNER" -C "$DATA_DIR"
          else
            echo "Aucune archive interne — copie depuis le sous-dossier out/"
            cp /tmp/or_extract/out/measurements_withoutEnclosedObject.csv "$DATA_DIR/"
          fi

          ls -lah "$DATA_DIR"

      # ── 6. Générer les vidéos ─────────────────────────────────────────────────
      - name: Générer les vidéos (zones ${{ inputs.zones || 'World Europe France' }})
        run: |
          set -euxo pipefail
          python -V
          echo "DATA_DIR=$DATA_DIR"
          echo "VIDEOS_DIR=$VIDEOS_DIR"
          ls -lah "$DATA_DIR"
          ZONES="${{ inputs.zones || 'World Europe France' }}"
          python -X faulthandler OR_video_groundlevel.py \
            --csv "$DATA_DIR/measurements_withoutEnclosedObject.csv" \
            --output-dir "$VIDEOS_DIR" \
            --zones $ZONES 2>&1 | tee generation.log

      # ── 6b. Archiver le log de génération (toujours, pour debug) ─────────────
      - name: Archiver le log de génération
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generation-log-${{ github.run_id }}
          path: generation.log
          retention-days: 7
          if-no-files-found: warn

      # ── 7. Uploader sur YouTube ───────────────────────────────────────────────
      - name: Upload YouTube — World
        if: contains(inputs.zones || 'World Europe France', 'World')
        run: |
          python upload_youtube.py \
            --zone World \
            --privacy "${{ inputs.privacy || 'public' }}"

      - name: Upload YouTube — Europe
        if: contains(inputs.zones || 'World Europe France', 'Europe')
        run: |
          python upload_youtube.py \
            --zone Europe \
            --privacy "${{ inputs.privacy || 'public' }}"

      - name: Upload YouTube — France
        if: contains(inputs.zones || 'World Europe France', 'France')
        run: |
          python upload_youtube.py \
            --zone France \
            --privacy "${{ inputs.privacy || 'public' }}"

      # ── 8. Archiver les vidéos en artefact (optionnel, 7 jours) ──────────────
      - name: Archiver les vidéos générées
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: videos-${{ github.run_id }}
          path: videos/*.mp4
          retention-days: 7
          if-no-files-found: warn
